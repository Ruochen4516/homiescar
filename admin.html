<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HomiesCar 相册管理员</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .admin-page {
        min-height: 100vh;
        padding: 96px max(20px, calc((100vw - var(--max)) / 2)) 56px;
      }

      .admin-layout {
        display: grid;
        grid-template-columns: 0.9fr 1.1fr;
        gap: 22px;
        margin-top: 34px;
      }

      .admin-panel {
        padding: 22px;
        border: 1px solid var(--line-soft);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.045);
      }

      .admin-panel label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .admin-panel select,
      .admin-panel input[type="number"] {
        width: 100%;
        min-height: 44px;
        margin-bottom: 16px;
        padding: 0 12px;
        border: 1px solid var(--line-soft);
        border-radius: var(--radius);
        color: var(--text);
        background: rgba(4, 10, 11, 0.72);
        font: inherit;
      }

      .dropzone {
        display: grid;
        min-height: 180px;
        margin-bottom: 18px;
        padding: 22px;
        place-items: center;
        border: 1px dashed rgba(100, 246, 220, 0.5);
        border-radius: var(--radius);
        color: #d2dfdd;
        background: rgba(100, 246, 220, 0.06);
        text-align: center;
        cursor: pointer;
      }

      .admin-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .admin-log {
        min-height: 120px;
        margin-top: 18px;
        padding: 14px;
        overflow: auto;
        border: 1px solid var(--line-soft);
        border-radius: var(--radius);
        color: var(--muted);
        background: rgba(0, 0, 0, 0.28);
        font-family: Consolas, "Microsoft YaHei UI", monospace;
        font-size: 12px;
        line-height: 1.6;
        white-space: pre-wrap;
      }

      .admin-preview {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .admin-preview figure {
        position: relative;
        margin: 0;
        overflow: hidden;
        border: 1px solid var(--line-soft);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.04);
      }

      .admin-preview figure.is-cover {
        border-color: rgba(100, 246, 220, 0.8);
        box-shadow: 0 0 0 1px rgba(100, 246, 220, 0.28);
      }

      .admin-preview figure.is-cover::before {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 2;
        padding: 5px 8px;
        border-radius: 999px;
        color: #06110f;
        content: "封面";
        background: linear-gradient(135deg, var(--cyan), var(--mint));
        font-size: 12px;
        font-weight: 900;
      }

      .admin-preview img {
        width: 100%;
        height: 160px;
        object-fit: cover;
      }

      .admin-preview figcaption {
        display: grid;
        gap: 8px;
        padding: 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .photo-meta {
        line-height: 1.5;
      }

      .caption-input {
        width: 100%;
        min-height: 38px;
        padding: 0 10px;
        border: 1px solid var(--line-soft);
        border-radius: 6px;
        color: var(--text);
        background: rgba(0, 0, 0, 0.28);
        font: inherit;
        font-size: 12px;
      }

      .photo-tools {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .photo-tools button {
        min-height: 30px;
        padding: 0 8px;
        border: 1px solid var(--line-soft);
        border-radius: 6px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.07);
        cursor: pointer;
        font: inherit;
        font-size: 12px;
      }

      .photo-tools button[data-action="delete"] {
        color: #ffd9d6;
        border-color: rgba(255, 91, 79, 0.34);
        background: rgba(255, 91, 79, 0.12);
      }

      .existing-note {
        margin: 8px 0 18px;
        color: var(--muted);
        line-height: 1.7;
      }

      .empty-preview {
        margin: 0;
        padding: 22px;
        border: 1px dashed var(--line-soft);
        border-radius: var(--radius);
        color: var(--muted);
      }

      @media (max-width: 920px) {
        .admin-layout {
          grid-template-columns: 1fr;
        }

        .admin-preview {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <main class="admin-page">
      <p class="eyebrow">HomiesCar Admin</p>
      <h1>活动相册生成器</h1>
      <p class="hero-copy">
        选择活动，拖入照片，工具会在浏览器里压缩图片并更新相册资料。推荐使用 Chrome 或 Edge，选择本项目文件夹后可直接写入网站文件。
      </p>

      <div class="admin-layout">
        <section class="admin-panel" aria-label="相册上传设置">
          <label for="event-select">活动</label>
          <select id="event-select"></select>

          <label for="max-size">最长边像素</label>
          <input id="max-size" type="number" min="960" max="2560" step="80" value="1600" />

          <label for="quality">压缩质量 0.60 - 0.92</label>
          <input id="quality" type="number" min="0.6" max="0.92" step="0.02" value="0.82" />

          <label class="dropzone" for="photo-input">
            <span>点击选择或拖入照片<br />支持 JPG / PNG / WebP，可一次选择多张</span>
          </label>
          <input id="photo-input" type="file" accept="image/*" multiple hidden />

          <div class="admin-actions">
            <button class="button primary" id="write-project" type="button">写入项目文件夹</button>
            <button class="button ghost" id="download-files" type="button">下载生成文件</button>
            <button class="button ghost" id="clear-queue" type="button">清空本次选择</button>
            <a class="button ghost" href="index.html#recap">返回网站</a>
          </div>

          <div class="admin-log" id="admin-log">等待选择照片。</div>
        </section>

        <section class="admin-panel" aria-label="照片预览">
          <h2>照片编辑</h2>
          <p class="existing-note" id="existing-note">选择活动后，可管理已有相册和本次上传照片。</p>
          <div class="admin-preview" id="admin-preview"></div>
        </section>
      </div>
    </main>

    <script src="gallery-data.js"></script>
    <script>
      const store = window.HOMIESCAR_GALLERIES || { events: [], galleries: {} };
      const eventSelect = document.querySelector("#event-select");
      const input = document.querySelector("#photo-input");
      const dropzone = document.querySelector(".dropzone");
      const preview = document.querySelector("#admin-preview");
      const existingNote = document.querySelector("#existing-note");
      const logEl = document.querySelector("#admin-log");
      const maxSizeInput = document.querySelector("#max-size");
      const qualityInput = document.querySelector("#quality");
      let selectedItems = [];

      const log = (message) => {
        logEl.textContent = `${new Date().toLocaleTimeString("zh-CN")} ${message}\n${logEl.textContent}`;
      };

      store.events.forEach((event) => {
        const option = document.createElement("option");
        option.value = event.id;
        option.textContent = `${event.date} · ${event.title}`;
        eventSelect.appendChild(option);
      });

      const getSelectedEvent = () => store.events.find((event) => event.id === eventSelect.value);

      const createLocalItem = (file) => ({
        id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
        type: "local",
        file,
        src: URL.createObjectURL(file),
        caption: ""
      });

      const loadExistingGallery = () => {
        const event = getSelectedEvent();
        const gallery = event ? store.galleries[event.id] || [] : [];
        selectedItems = gallery.map((photo, index) => ({
          id: `${event.id}-existing-${index}`,
          type: "existing",
          file: null,
          src: photo.src,
          caption: photo.alt || ""
        }));
        existingNote.textContent = gallery.length
          ? `当前活动已有 ${gallery.length} 张线上照片，可删除、改说明、调整顺序后重新写入相册资料。`
          : "当前活动还没有线上相册，拖入照片即可创建。";
        renderPreview();
      };

      const renderPreview = () => {
        preview.innerHTML = "";
        if (!selectedItems.length) {
          preview.innerHTML = `<p class="empty-preview">暂无照片。拖入照片后，可以删除、设封面、上移下移和编辑说明。</p>`;
          return;
        }

        selectedItems.forEach((item, index) => {
          const figure = document.createElement("figure");
          figure.className = index === 0 ? "is-cover" : "";
          figure.dataset.id = item.id;
          const img = document.createElement("img");
          img.src = item.src;
          const caption = document.createElement("figcaption");
          const meta = item.type === "local"
            ? `${item.file.name} · ${(item.file.size / 1024 / 1024).toFixed(1)} MB`
            : "线上照片 · 重新写入资料后生效";
          caption.innerHTML = `
            <div class="photo-meta">${index + 1}. ${meta}</div>
            <input class="caption-input" data-action="caption" value="${item.caption.replace(/"/g, "&quot;")}" placeholder="照片说明，例如：车队合影" />
            <div class="photo-tools">
              <button type="button" data-action="cover">设为封面</button>
              <button type="button" data-action="up">上移</button>
              <button type="button" data-action="down">下移</button>
              <button type="button" data-action="delete">删除</button>
            </div>
          `;
          figure.append(img, caption);
          preview.appendChild(figure);
        });
      };

      const collectFiles = (files) => {
        const incoming = Array.from(files).filter((file) => file.type.startsWith("image/")).map(createLocalItem);
        selectedItems = [...selectedItems, ...incoming];
        renderPreview();
        log(`已加入 ${incoming.length} 张照片，当前队列 ${selectedItems.length} 张。`);
      };

      const findItemIndex = (target) => {
        const figure = target.closest("figure");
        return selectedItems.findIndex((item) => item.id === figure?.dataset.id);
      };

      preview.addEventListener("click", (event) => {
        const action = event.target.dataset.action;
        if (!action || action === "caption") return;
        const index = findItemIndex(event.target);
        if (index < 0) return;

        if (action === "delete") {
          selectedItems.splice(index, 1);
          log(`已删除第 ${index + 1} 张照片。`);
        }
        if (action === "cover") {
          selectedItems.unshift(selectedItems.splice(index, 1)[0]);
          log("已设为封面。");
        }
        if (action === "up" && index > 0) {
          [selectedItems[index - 1], selectedItems[index]] = [selectedItems[index], selectedItems[index - 1]];
        }
        if (action === "down" && index < selectedItems.length - 1) {
          [selectedItems[index + 1], selectedItems[index]] = [selectedItems[index], selectedItems[index + 1]];
        }
        renderPreview();
      });

      preview.addEventListener("input", (event) => {
        if (event.target.dataset.action !== "caption") return;
        const index = findItemIndex(event.target);
        if (index >= 0) selectedItems[index].caption = event.target.value;
      });

      eventSelect.addEventListener("change", loadExistingGallery);

      document.querySelector("#clear-queue").addEventListener("click", () => {
        selectedItems = [];
        renderPreview();
        log("已清空当前编辑队列。");
      });

      input.addEventListener("change", () => collectFiles(input.files));
      dropzone.addEventListener("dragover", (event) => {
        event.preventDefault();
        dropzone.classList.add("is-active");
      });
      dropzone.addEventListener("dragleave", () => dropzone.classList.remove("is-active"));
      dropzone.addEventListener("drop", (event) => {
        event.preventDefault();
        dropzone.classList.remove("is-active");
        collectFiles(event.dataTransfer.files);
      });

      const compressImage = (file, maxSize, quality) =>
        new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => {
            const scale = Math.min(1, maxSize / Math.max(image.width, image.height));
            const canvas = document.createElement("canvas");
            canvas.width = Math.round(image.width * scale);
            canvas.height = Math.round(image.height * scale);
            const ctx = canvas.getContext("2d");
            ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
            canvas.toBlob(
              (blob) => {
                if (!blob) reject(new Error("图片压缩失败"));
                resolve(blob);
              },
              "image/jpeg",
              quality
            );
          };
          image.onerror = () => reject(new Error(`${file.name} 读取失败`));
          image.src = URL.createObjectURL(file);
        });

      const buildPackage = async () => {
        const event = getSelectedEvent();
        if (!event) throw new Error("请选择活动");
        if (!selectedItems.length) throw new Error("请先添加或保留至少一张照片");

        const maxSize = Number(maxSizeInput.value);
        const quality = Number(qualityInput.value);
        const photos = [];
        const files = [];

        for (let index = 0; index < selectedItems.length; index += 1) {
          const item = selectedItems[index];
          const alt = item.caption.trim() || `${event.title} 活动照片 ${index + 1}`;
          if (item.type === "existing") {
            photos.push({ src: item.src, alt });
            continue;
          }
          const blob = await compressImage(item.file, maxSize, quality);
          const filename = `${event.id}-${String(index + 1).padStart(2, "0")}.jpg`;
          const path = `assets/galleries/${event.id}/${filename}`;
          photos.push({ src: path, alt });
          files.push({ filename, blob });
          log(`已压缩 ${filename}，${(blob.size / 1024).toFixed(0)} KB。`);
        }

        store.galleries[event.id] = photos;
        const nextStore = {
          events: store.events,
          galleries: store.galleries
        };
        const dataText = `window.HOMIESCAR_GALLERIES = ${JSON.stringify(nextStore, null, 2)};\n`;
        return { event, files, dataText };
      };

      const writeTextFile = async (directory, pathParts, content) => {
        let current = directory;
        for (const part of pathParts.slice(0, -1)) {
          current = await current.getDirectoryHandle(part, { create: true });
        }
        const handle = await current.getFileHandle(pathParts.at(-1), { create: true });
        const writable = await handle.createWritable();
        await writable.write(content);
        await writable.close();
      };

      const writeBlobFile = async (directory, pathParts, blob) => {
        let current = directory;
        for (const part of pathParts.slice(0, -1)) {
          current = await current.getDirectoryHandle(part, { create: true });
        }
        const handle = await current.getFileHandle(pathParts.at(-1), { create: true });
        const writable = await handle.createWritable();
        await writable.write(blob);
        await writable.close();
      };

      document.querySelector("#write-project").addEventListener("click", async () => {
        try {
          if (!window.showDirectoryPicker) {
            throw new Error("当前浏览器不支持直接写入文件夹，请使用 Chrome/Edge 或改用下载生成文件。");
          }
          const result = await buildPackage();
          const root = await window.showDirectoryPicker({ mode: "readwrite" });
          for (const file of result.files) {
            await writeBlobFile(root, ["assets", "galleries", result.event.id, file.filename], file.blob);
          }
          await writeTextFile(root, ["gallery-data.js"], result.dataText);
          log(`已写入 ${result.event.title}：${result.files.length} 张照片，并更新 gallery-data.js。`);
        } catch (error) {
          log(error.message);
        }
      });

      document.querySelector("#download-files").addEventListener("click", async () => {
        try {
          const result = await buildPackage();
          for (const file of result.files) {
            const link = document.createElement("a");
            link.href = URL.createObjectURL(file.blob);
            link.download = file.filename;
            link.click();
          }
          const dataLink = document.createElement("a");
          dataLink.href = URL.createObjectURL(new Blob([result.dataText], { type: "text/javascript" }));
          dataLink.download = "gallery-data.js";
          dataLink.click();
          log("已下载照片和 gallery-data.js，请把照片放入对应活动文件夹。");
        } catch (error) {
          log(error.message);
        }
      });

      loadExistingGallery();
    </script>
  </body>
</html>
