<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HomiesCar 相册管理员</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .admin-page {
        min-height: 100vh;
        padding: 96px max(20px, calc((100vw - var(--max)) / 2)) 56px;
      }

      .admin-layout {
        display: grid;
        grid-template-columns: 0.9fr 1.1fr;
        gap: 22px;
        margin-top: 34px;
      }

      .admin-panel {
        padding: 22px;
        border: 1px solid var(--line-soft);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.045);
      }

      .admin-panel label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .admin-panel select,
      .admin-panel input[type="number"] {
        width: 100%;
        min-height: 44px;
        margin-bottom: 16px;
        padding: 0 12px;
        border: 1px solid var(--line-soft);
        border-radius: var(--radius);
        color: var(--text);
        background: rgba(4, 10, 11, 0.72);
        font: inherit;
      }

      .dropzone {
        display: grid;
        min-height: 180px;
        margin-bottom: 18px;
        padding: 22px;
        place-items: center;
        border: 1px dashed rgba(100, 246, 220, 0.5);
        border-radius: var(--radius);
        color: #d2dfdd;
        background: rgba(100, 246, 220, 0.06);
        text-align: center;
        cursor: pointer;
      }

      .admin-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .admin-log {
        min-height: 120px;
        margin-top: 18px;
        padding: 14px;
        overflow: auto;
        border: 1px solid var(--line-soft);
        border-radius: var(--radius);
        color: var(--muted);
        background: rgba(0, 0, 0, 0.28);
        font-family: Consolas, "Microsoft YaHei UI", monospace;
        font-size: 12px;
        line-height: 1.6;
        white-space: pre-wrap;
      }

      .admin-preview {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .admin-preview figure {
        margin: 0;
        overflow: hidden;
        border: 1px solid var(--line-soft);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.04);
      }

      .admin-preview img {
        width: 100%;
        height: 160px;
        object-fit: cover;
      }

      .admin-preview figcaption {
        padding: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      @media (max-width: 920px) {
        .admin-layout {
          grid-template-columns: 1fr;
        }

        .admin-preview {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <main class="admin-page">
      <p class="eyebrow">HomiesCar Admin</p>
      <h1>活动相册生成器</h1>
      <p class="hero-copy">
        选择活动，拖入照片，工具会在浏览器里压缩图片并更新相册资料。推荐使用 Chrome 或 Edge，选择本项目文件夹后可直接写入网站文件。
      </p>

      <div class="admin-layout">
        <section class="admin-panel" aria-label="相册上传设置">
          <label for="event-select">活动</label>
          <select id="event-select"></select>

          <label for="max-size">最长边像素</label>
          <input id="max-size" type="number" min="960" max="2560" step="80" value="1600" />

          <label for="quality">压缩质量 0.60 - 0.92</label>
          <input id="quality" type="number" min="0.6" max="0.92" step="0.02" value="0.82" />

          <label class="dropzone" for="photo-input">
            <span>点击选择或拖入照片<br />支持 JPG / PNG / WebP，可一次选择多张</span>
          </label>
          <input id="photo-input" type="file" accept="image/*" multiple hidden />

          <div class="admin-actions">
            <button class="button primary" id="write-project" type="button">写入项目文件夹</button>
            <button class="button ghost" id="download-files" type="button">下载生成文件</button>
            <a class="button ghost" href="index.html#recap">返回网站</a>
          </div>

          <div class="admin-log" id="admin-log">等待选择照片。</div>
        </section>

        <section class="admin-panel" aria-label="照片预览">
          <h2>预览</h2>
          <div class="admin-preview" id="admin-preview"></div>
        </section>
      </div>
    </main>

    <script src="gallery-data.js"></script>
    <script>
      const store = window.HOMIESCAR_GALLERIES || { events: [], galleries: {} };
      const eventSelect = document.querySelector("#event-select");
      const input = document.querySelector("#photo-input");
      const dropzone = document.querySelector(".dropzone");
      const preview = document.querySelector("#admin-preview");
      const logEl = document.querySelector("#admin-log");
      const maxSizeInput = document.querySelector("#max-size");
      const qualityInput = document.querySelector("#quality");
      let selectedFiles = [];

      const log = (message) => {
        logEl.textContent = `${new Date().toLocaleTimeString("zh-CN")} ${message}\n${logEl.textContent}`;
      };

      store.events.forEach((event) => {
        const option = document.createElement("option");
        option.value = event.id;
        option.textContent = `${event.date} · ${event.title}`;
        eventSelect.appendChild(option);
      });

      const getSelectedEvent = () => store.events.find((event) => event.id === eventSelect.value);

      const renderPreview = () => {
        preview.innerHTML = "";
        selectedFiles.forEach((file) => {
          const figure = document.createElement("figure");
          const img = document.createElement("img");
          img.src = URL.createObjectURL(file);
          const caption = document.createElement("figcaption");
          caption.textContent = `${file.name} · ${(file.size / 1024 / 1024).toFixed(1)} MB`;
          figure.append(img, caption);
          preview.appendChild(figure);
        });
      };

      const collectFiles = (files) => {
        selectedFiles = Array.from(files).filter((file) => file.type.startsWith("image/"));
        renderPreview();
        log(`已选择 ${selectedFiles.length} 张照片。`);
      };

      input.addEventListener("change", () => collectFiles(input.files));
      dropzone.addEventListener("dragover", (event) => {
        event.preventDefault();
        dropzone.classList.add("is-active");
      });
      dropzone.addEventListener("dragleave", () => dropzone.classList.remove("is-active"));
      dropzone.addEventListener("drop", (event) => {
        event.preventDefault();
        dropzone.classList.remove("is-active");
        collectFiles(event.dataTransfer.files);
      });

      const compressImage = (file, maxSize, quality) =>
        new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => {
            const scale = Math.min(1, maxSize / Math.max(image.width, image.height));
            const canvas = document.createElement("canvas");
            canvas.width = Math.round(image.width * scale);
            canvas.height = Math.round(image.height * scale);
            const ctx = canvas.getContext("2d");
            ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
            canvas.toBlob(
              (blob) => {
                if (!blob) reject(new Error("图片压缩失败"));
                resolve(blob);
              },
              "image/jpeg",
              quality
            );
          };
          image.onerror = () => reject(new Error(`${file.name} 读取失败`));
          image.src = URL.createObjectURL(file);
        });

      const buildPackage = async () => {
        const event = getSelectedEvent();
        if (!event) throw new Error("请选择活动");
        if (!selectedFiles.length) throw new Error("请选择照片");

        const maxSize = Number(maxSizeInput.value);
        const quality = Number(qualityInput.value);
        const photos = [];
        const files = [];

        for (let index = 0; index < selectedFiles.length; index += 1) {
          const file = selectedFiles[index];
          const blob = await compressImage(file, maxSize, quality);
          const filename = `${event.id}-${String(index + 1).padStart(2, "0")}.jpg`;
          const path = `assets/galleries/${event.id}/${filename}`;
          photos.push({ src: path, alt: `${event.title} 活动照片 ${index + 1}` });
          files.push({ filename, blob });
          log(`已压缩 ${filename}，${(blob.size / 1024).toFixed(0)} KB。`);
        }

        store.galleries[event.id] = photos;
        const nextStore = {
          events: store.events,
          galleries: store.galleries
        };
        const dataText = `window.HOMIESCAR_GALLERIES = ${JSON.stringify(nextStore, null, 2)};\n`;
        return { event, files, dataText };
      };

      const writeTextFile = async (directory, pathParts, content) => {
        let current = directory;
        for (const part of pathParts.slice(0, -1)) {
          current = await current.getDirectoryHandle(part, { create: true });
        }
        const handle = await current.getFileHandle(pathParts.at(-1), { create: true });
        const writable = await handle.createWritable();
        await writable.write(content);
        await writable.close();
      };

      const writeBlobFile = async (directory, pathParts, blob) => {
        let current = directory;
        for (const part of pathParts.slice(0, -1)) {
          current = await current.getDirectoryHandle(part, { create: true });
        }
        const handle = await current.getFileHandle(pathParts.at(-1), { create: true });
        const writable = await handle.createWritable();
        await writable.write(blob);
        await writable.close();
      };

      document.querySelector("#write-project").addEventListener("click", async () => {
        try {
          if (!window.showDirectoryPicker) {
            throw new Error("当前浏览器不支持直接写入文件夹，请使用 Chrome/Edge 或改用下载生成文件。");
          }
          const result = await buildPackage();
          const root = await window.showDirectoryPicker({ mode: "readwrite" });
          for (const file of result.files) {
            await writeBlobFile(root, ["assets", "galleries", result.event.id, file.filename], file.blob);
          }
          await writeTextFile(root, ["gallery-data.js"], result.dataText);
          log(`已写入 ${result.event.title}：${result.files.length} 张照片，并更新 gallery-data.js。`);
        } catch (error) {
          log(error.message);
        }
      });

      document.querySelector("#download-files").addEventListener("click", async () => {
        try {
          const result = await buildPackage();
          for (const file of result.files) {
            const link = document.createElement("a");
            link.href = URL.createObjectURL(file.blob);
            link.download = file.filename;
            link.click();
          }
          const dataLink = document.createElement("a");
          dataLink.href = URL.createObjectURL(new Blob([result.dataText], { type: "text/javascript" }));
          dataLink.download = "gallery-data.js";
          dataLink.click();
          log("已下载照片和 gallery-data.js，请把照片放入对应活动文件夹。");
        } catch (error) {
          log(error.message);
        }
      });
    </script>
  </body>
</html>
